<!DOCTYPE html>
<html lang="pt-br">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styleguide Automático - Design Tokens</title>
    <link rel="stylesheet" href="./build/css/tokens.css">

    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--variable-collection-grey-950, #171717);
        color: var(--variable-collection-white, #ffffff);
       padding: 40px;
        line-height: 1.6;
        margin: 0;
      }

      h1 { 
        border-bottom: 2px solid var(--variable-collection-grey-800); 
        padding-bottom: 10px; 
        margin-bottom: 10px;
      }

      .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
        gap: 20px; 
        margin-top: 30px; 
      }

      .card {
        background: var(--variable-collection-grey-900);
        border: 1px solid var(--variable-collection-grey-800);
        padding: 20px;
        border-radius: 12px;
        transition: transform 0.2s ease;
      }
    
      .card:hover { 
        transform: translateY(-5px); 
      }
    
      .swatch {
        height: 120px;
        border-radius: 8px;
        margin-bottom: 15px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
      }
    
      .info strong { 
        display: block; 
        margin-bottom: 5px; 
       font-size: 1rem; 
        color: var(--variable-collection-white);
      }
    
      .info span {
        font-size: 0.85rem;
        color: var(--variable-collection-grey-400);
        display: block;
      }


      code { 
        font-size: 0.75rem; 
        background: #000; 
        padding: 6px; 
        border-radius: 4px; 
        display: block;
        margin-top: 10px;
        word-break: break-all;
        color: #7ee787;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>


  <body>

    <h1>🎨 My Design Tokens Styleguide</h1>
    
    <p>Visualização dinâmica do arquivo <code>build/js/tokens.js</code>.</p>


    <div class="grid" id="token-grid">
    </div>


    <script type="module">
      import * as Tokens from './build/js/tokens.js';
      const grid = document.getElementById('token-grid');
      const toKebabCase = (str) => {
        return str.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
      };
      
      
      Object.entries(Tokens).forEach(([name, value]) => {

        // 1. Verifica se o valor é uma string e se começa com '#' (Hexadecimal)
        if (typeof value === 'string' && value.startsWith('#')) {
        
          const card = document.createElement('div');
          card.className = 'card';
        
          // 2. Gera o nome da variável CSS (ex: --variable-name)
          const cssVar = `--${toKebabCase(name)}`;

          // 3. Monta o HTML interno do card
          card.innerHTML = `
            <div class="swatch" style="background-color: ${value};"></div>
            <div class="info">
              <strong>${name}</strong>
              <span>Hex: ${value}</span>
              <code>var(${cssVar})</code>
            </div>
          `;

          grid.appendChild(card);
        }

      });
    </script>

  </body>

</html>
